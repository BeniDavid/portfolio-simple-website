<div class="contact-form"> 
<form>
        <table>

            <tr>
                <td>Name:</td>
                <td><input type="text" placeholder="Enter your name" class="contact-form__input">
                </td>
            </tr>

            <tr>
                <td>email:</td>
                <td><input type="email" placeholder="Enter your email" class="contact-form__input">
                </td>
            </tr>

            <tr>
                <td>Message</td>
                <td>
                    <textarea placeholder="Message" class="contact-form__textarea"></textarea>
                </td>
            </tr>
            <tr>
                <td></td>
                <td><input type="Submit" class="contact-form__submit">
                </td>
            </tr>


        </table>

    </form>
